<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Ödeme Sistemi</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        .card { border: 1px solid #ddd; padding: 20px; border-radius: 8px; box-shadow: 2px 2px 10px #eee; }
        select, input, button { display: block; width: 100%; margin-bottom: 10px; padding: 8px; }
    </style>
</head>
<body>
<div class="card">
    <h3>Ödeme Ekranı</h3>
    <input type="number" id="amount" placeholder="Tutar giriniz (TL)">
    <select id="type">
        <option value="CREDIT_CARD">Kredi Kartı</option>
        <option value="QR">QR ile Ödeme</option>
        <option value="EFT">EFT</option>
    </select>
    <button onclick="pay()">Öde</button>
    <div id="result" style="margin-top: 15px; font-weight: bold; color: #2c3e50;"></div>
</div>

<script>
    async function pay() {
        const amount = document.getElementById('amount').value;
        const type = document.getElementById('type').value;
        const resultDiv = document.getElementById('result');


        const requestData = {
            amount: parseInt(amount),
            type: type
        };

        try {
            const response = await fetch('/api/payment/execute', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(requestData)
            });

            const message = await response.text();
            resultDiv.innerText = message;
        } catch (error) {
            resultDiv.innerText = "Hata oluştu: " + error.message;
        }
    }
</script>
</body>
</html>
